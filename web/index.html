<!DOCTYPE html>
<html lang="de">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="WarteListe Pro — Modernes Wartelisten-Management fuer Praxen. Patienten verwalten, Rezepte tracken, Standorte koordinieren.">
  <meta name="theme-color" content="#0F766E">
  <meta name="color-scheme" content="light">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="WarteListe Pro">
  <meta property="og:description" content="Wartelisten-Management fuer Praxen">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WarteListe Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon: SVG (modern) + PNG fallback -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="mask-icon" href="favicon.svg" color="#0F766E">

  <title>WarteListe Pro</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload Inter for faster paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F1F5F9; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif; }
    /* Splash while Flutter boots */
    #splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      background: #F1F5F9;
      z-index: 9999;
      transition: opacity 300ms ease-out;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .logo {
      width: 72px; height: 72px; border-radius: 18px;
      background: linear-gradient(135deg, #14B8A6, #0F766E);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(15,118,110,0.25);
    }
    #splash .logo svg { width: 40px; height: 40px; }
    #splash .title { color: #0F172A; font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
    #splash .sub { color: #64748B; font-size: 13px; margin-top: -8px; }
    #splash .bar {
      width: 120px; height: 3px; border-radius: 999px; overflow: hidden;
      background: #E2E8F0; margin-top: 8px;
    }
    #splash .bar::after {
      content: ''; display: block; width: 40%; height: 100%;
      background: #0F766E; border-radius: 999px;
      animation: progress 1.2s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 1 0 4 0 2 2 0 0 0-4 0zm0 0h4m-4 8l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">WarteListe Pro</div>
    <div class="sub">wird geladen …</div>
    <div class="bar"></div>
  </div>
  <script>
    // Remove splash when Flutter first paints
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('splash');
      if (el) { el.classList.add('hide'); setTimeout(function(){ el.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
